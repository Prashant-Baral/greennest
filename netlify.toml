[build]
  # Directory that contains the deploy-ready HTML files and assets.
  publish = "."
  
  # No build command is needed for a static HTML site
  command = ""

# SEO Redirects to preserve link equity and fix broken links
[[redirects]]
  from = "/home"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/about-us"
  to = "/about.html"
  status = 301
  force = true

[[redirects]]
  from = "/store"
  to = "/products.html"
  status = 301
  force = true

# Optional: Add headers for security and caching if needed
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
